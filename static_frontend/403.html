<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>403 — Access Denied</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />

</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px">
  <div>
    <div style="font-size:80px;margin-bottom:12px">🔒</div>
    <h1 style="font-family:var(--font-head);font-size:24px;font-weight:700;color:var(--text-primary);margin-bottom:8px">Access Denied</h1>
    <p style="font-size:14px;color:var(--text-secondary);margin-bottom:24px;max-width:340px">HODs can only access their own department. Department isolation enforced at query level.</p>
    <button onclick="history.back()" class="btn btn-primary"><i class="fa-solid fa-arrow-left"></i> Go Back</button>
  </div>
</div>
