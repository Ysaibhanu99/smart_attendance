<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audit Logs — SmartAttend</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
<div id="app"></div>

<script src="../js/data.js"></script>
<script src="../js/components.js"></script>
<script src="../js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  loadComponents('admin', 'Audit Logs', 'audit-logs.html');
  renderPage();
});

const statusBadge = s => ({ present:'badge-success', absent:'badge-danger', excused:'badge-warning' })[s] || 'badge-neutral';

function renderLogs(logs) {
  document.getElementById('logsBody').innerHTML = logs.map(l => `
    <tr>
      <td style="color:var(--text-muted);font-size:12px">${l.id}</td>
      <td><strong>${l.student}</strong></td>
      <td style="color:var(--text-secondary)">${l.subject}</td>
      <td style="color:var(--text-muted);font-size:12px">${l.date}</td>
      <td><span class="badge ${statusBadge(l.old)}">${l.old.charAt(0).toUpperCase()+l.old.slice(1)}</span></td>
      <td><span class="badge ${statusBadge(l.new)}">${l.new.charAt(0).toUpperCase()+l.new.slice(1)}</span></td>
      <td style="color:var(--text-secondary)">${l.by}</td>
      <td style="font-size:12px;color:var(--text-secondary);max-width:200px">${l.reason}</td>
      <td style="color:var(--text-muted);font-size:11px;white-space:nowrap">${l.ts}</td>
    </tr>`).join('');
}

function renderPage() {
  document.getElementById('pageContent').innerHTML = `
    <div class="page-header">
      <h1 class="page-title">Audit Logs</h1>
      <p class="page-subtitle">Every attendance change — auto-captured by database trigger</p>
    </div>

    <div class="alert alert-info" style="margin-bottom:20px">
      <i class="fa-solid fa-circle-info"></i>
      Logs written by MySQL trigger <code>tr_attendance_update_log</code> — cannot be deleted by anyone.
    </div>

    <div class="filter-bar">
      <div class="search-input-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="logSearch" placeholder="Search student, faculty, reason..." />
      </div>
      <select id="changeFilter" style="width:auto;min-width:160px">
        <option value="">All Changes</option>
        <option value="present">→ Present</option>
        <option value="absent">→ Absent</option>
        <option value="excused">→ Excused</option>
      </select>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>#</th><th>Student</th><th>Subject</th><th>Date</th><th>Old</th><th>New</th><th>Changed By</th><th>Reason</th><th>Timestamp</th></tr>
          </thead>
          <tbody id="logsBody"></tbody>
        </table>
      </div>
      <div style="padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:var(--text-muted)">Showing <span id="logCount">0</span> records</span>
      </div>
    </div>
  `;

  renderLogs(APP_DATA.auditLogs);
  document.getElementById('logCount').textContent = APP_DATA.auditLogs.length;

  document.getElementById('logSearch').addEventListener('input', filterLogs);
  document.getElementById('changeFilter').addEventListener('change', filterLogs);
}

function filterLogs() {
  const q      = document.getElementById('logSearch').value.toLowerCase();
  const change = document.getElementById('changeFilter').value;
  const filtered = APP_DATA.auditLogs.filter(l =>
    (!q      || l.student.toLowerCase().includes(q) || l.by.toLowerCase().includes(q) || l.reason.toLowerCase().includes(q)) &&
    (!change || l.new === change)
  );
  renderLogs(filtered);
  document.getElementById('logCount').textContent = filtered.length;
}
</script>
</body>
</html>
