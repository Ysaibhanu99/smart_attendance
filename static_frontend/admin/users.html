<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users — SmartAttend</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
<div id="app"></div>

<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/components.js"></script>
<script src="../js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  loadComponents('admin', 'User Management', 'users.html');
  await API.init(['users', 'notifications']);
  renderPage();
});

const roleBadge = r => ({
  admin:'badge-purple', hod:'badge-info', faculty:'badge-neutral', student:'badge-success'
})[r] || 'badge-neutral';

function renderPage() {
  document.getElementById('pageContent').innerHTML = `
    <div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div>
        <h1 class="page-title">Users</h1>
        <p class="page-subtitle">Manage HODs, Faculty, and Students</p>
      </div>
      <button class="btn btn-primary" data-open-modal="createUserModal">
        <i class="fa-solid fa-user-plus"></i> Add User
      </button>
    </div>

    <div class="filter-bar">
      <div class="search-input-wrap">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="userSearch" placeholder="Search name, email, department..." />
      </div>
      <select id="roleFilter" style="width:auto;min-width:130px">
        <option value="">All Roles</option>
        <option value="admin">Admin</option>
        <option value="hod">HOD</option>
        <option value="faculty">Faculty</option>
        <option value="student">Student</option>
      </select>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th>Name</th><th>Email</th><th>Role</th><th>Department</th><th>Status</th><th>Joined</th><th>Actions</th></tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- Create User Modal -->
    <div class="modal-overlay" id="createUserModal">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">Add New User</span>
          <button class="modal-close" data-close-modal><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group"><label>First Name</label><input type="text" id="newFirst" placeholder="First name" /></div>
            <div class="form-group"><label>Last Name</label><input type="text" id="newLast" placeholder="Last name" /></div>
          </div>
          <div class="form-group"><label>Email</label><input type="email" id="newEmail" placeholder="user@college.edu" /></div>
          <div class="form-row">
            <div class="form-group">
              <label>Role</label>
              <select id="newRole">
                <option value="hod">HOD</option>
                <option value="faculty">Faculty</option>
                <option value="student">Student</option>
              </select>
            </div>
            <div class="form-group">
              <label>Department</label>
              <select id="newDept">
                <option>CSE</option><option>ECE</option><option>MECH</option><option>CIVIL</option><option>IT</option>
              </select>
            </div>
          </div>
          <div class="form-group"><label>Password</label><input type="password" id="newPass" value="admin123" /></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost btn-sm" data-close-modal>Cancel</button>
          <button class="btn btn-primary btn-sm" onclick="createUser()">
            <i class="fa-solid fa-user-plus"></i> Create
          </button>
        </div>
      </div>
    </div>
  `;

  renderUsersTable(APP_DATA.users);
  initModals();

  document.getElementById('userSearch').addEventListener('input', filterUsers);
  document.getElementById('roleFilter').addEventListener('change', filterUsers);
}

function renderUsersTable(users) {
  document.getElementById('usersTableBody').innerHTML = users.map(u => `
    <tr>
      <td>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="user-avatar" style="width:30px;height:30px;font-size:12px;flex-shrink:0">${u.name[0].toUpperCase()}</div>
          <strong>${u.name}</strong>
        </div>
      </td>
      <td style="color:var(--text-secondary)">${u.email}</td>
      <td><span class="badge ${roleBadge(u.role)}">${u.role.charAt(0).toUpperCase()+u.role.slice(1)}</span></td>
      <td>${u.dept}</td>
      <td><span class="badge ${u.status==='active'?'badge-success':'badge-danger'}">${u.status.charAt(0).toUpperCase()+u.status.slice(1)}</span></td>
      <td style="color:var(--text-muted);font-size:12px">${u.joined}</td>
      <td>
        <div style="display:flex;gap:6px">
          <button class="btn btn-ghost btn-xs" onclick="showToast('Edit coming soon','info')"><i class="fa-solid fa-pen"></i></button>
          <button class="btn btn-ghost btn-xs" onclick="toggleStatus('${u.email}','${u.status}')">
            <i class="fa-solid fa-${u.status==='active'?'ban':'circle-check'}"></i>
          </button>
        </div>
      </td>
    </tr>`).join('');
}

function filterUsers() {
  const q    = document.getElementById('userSearch').value.toLowerCase();
  const role = document.getElementById('roleFilter').value;
  const filtered = APP_DATA.users.filter(u =>
    (!q    || u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)) &&
    (!role || u.role === role)
  );
  renderUsersTable(filtered);
}

function toggleStatus(email, status) {
  const action = status === 'active' ? 'deactivate' : 'activate';
  confirmAction(`${action.charAt(0).toUpperCase()+action.slice(1)} ${email}?`, () => {
    const user = APP_DATA.users.find(u => u.email === email);
    if (user) { user.status = status === 'active' ? 'inactive' : 'active'; }
    renderUsersTable(APP_DATA.users);
    showToast(`User ${action}d.`, 'success');
  });
}

function createUser() {
  const name = `${document.getElementById('newFirst').value} ${document.getElementById('newLast').value}`.trim();
  const email = document.getElementById('newEmail').value.trim();
  if (!name || !email) { showToast('Fill in name and email.', 'error'); return; }
  APP_DATA.users.push({
    name, email,
    role: document.getElementById('newRole').value,
    dept: document.getElementById('newDept').value,
    status: 'active',
    joined: new Date().toISOString().split('T')[0]
  });
  closeModal('createUserModal');
  renderUsersTable(APP_DATA.users);
  showToast('User created successfully.', 'success');
}
</script>
</body>
</html>
