<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Holidays — SmartAttend</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
<div id="app"></div>

<script src="../js/data.js"></script>
<script src="../js/components.js"></script>
<script src="../js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  loadComponents('admin', 'Holiday Management', 'holidays.html');
  renderPage();
});

const typeColor = t => ({ National:'badge-info', Festival:'badge-purple', College:'badge-neutral', Regional:'badge-warning' })[t] || 'badge-neutral';

function renderHolidays(list) {
  const cards = list.map(h => `
    <div class="card">
      <div style="padding:16px 18px;display:flex;align-items:flex-start;gap:12px">
        <div style="width:42px;height:42px;background:rgba(59,130,246,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <i class="fa-solid fa-calendar-xmark" style="color:var(--accent-blue);font-size:18px"></i>
        </div>
        <div style="flex:1">
          <div style="font-weight:600;color:var(--text-primary);font-size:14px">${h.name}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:3px">${h.date}</div>
          <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
            <span class="badge ${typeColor(h.type)}">${h.type}</span>
            ${h.recurring ? '<span class="badge badge-success">Recurring</span>' : ''}
          </div>
        </div>
        <button class="btn btn-ghost btn-xs" onclick="deleteHoliday(${h.id},'${h.name}')">
          <i class="fa-solid fa-trash" style="color:var(--accent-red)"></i>
        </button>
      </div>
    </div>`).join('');

  document.getElementById('holidayGrid').innerHTML = cards;
}

function renderPage() {
  document.getElementById('pageContent').innerHTML = `
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
      <div>
        <h1 class="page-title">Holidays</h1>
        <p class="page-subtitle">Dates here auto-excluded from attendance calculations</p>
      </div>
      <button class="btn btn-primary" data-open-modal="addHolidayModal">
        <i class="fa-solid fa-calendar-plus"></i> Add Holiday
      </button>
    </div>

    <div class="alert alert-info" style="margin-bottom:20px">
      <i class="fa-solid fa-circle-info"></i>
      Students are <strong>not penalised</strong> on holiday dates — attendance query excludes them automatically.
    </div>

    <div id="holidayGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-bottom:24px"></div>

    <!-- Modal -->
    <div class="modal-overlay" id="addHolidayModal">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title">Add Holiday</span>
          <button class="modal-close" data-close-modal><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
          <div class="form-group"><label>Holiday Name</label><input type="text" id="hName" placeholder="e.g. Diwali" /></div>
          <div class="form-row">
            <div class="form-group"><label>Date</label><input type="date" id="hDate" /></div>
            <div class="form-group">
              <label>Type</label>
              <select id="hType"><option>National</option><option>Festival</option><option>Regional</option><option>College</option></select>
            </div>
          </div>
          <div class="form-group">
            <label style="display:flex;align-items:center;gap:8px;text-transform:none;letter-spacing:0;font-weight:400;cursor:pointer">
              <input type="checkbox" id="hRecurring" style="width:auto;accent-color:var(--accent-blue)" />
              <span style="font-size:13px;color:var(--text-secondary)">Recurring yearly holiday</span>
            </label>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-ghost btn-sm" data-close-modal>Cancel</button>
          <button class="btn btn-primary btn-sm" onclick="addHoliday()"><i class="fa-solid fa-plus"></i> Add</button>
        </div>
      </div>
    </div>
  `;

  renderHolidays(APP_DATA.holidays);
  initModals();
}

function addHoliday() {
  const name = document.getElementById('hName').value.trim();
  const date = document.getElementById('hDate').value;
  if (!name || !date) { showToast('Fill in name and date.', 'error'); return; }
  const newH = {
    id: Date.now(),
    name, date,
    type: document.getElementById('hType').value,
    recurring: document.getElementById('hRecurring').checked
  };
  APP_DATA.holidays.push(newH);
  closeModal('addHolidayModal');
  renderHolidays(APP_DATA.holidays);
  showToast(`${name} added as holiday.`, 'success');
  document.getElementById('hName').value = '';
  document.getElementById('hDate').value = '';
}

function deleteHoliday(id, name) {
  confirmAction(`Remove "${name}" from holiday list?`, () => {
    APP_DATA.holidays = APP_DATA.holidays.filter(h => h.id !== id);
    renderHolidays(APP_DATA.holidays);
    showToast(`${name} removed.`, 'success');
  });
}
</script>
</body>
</html>
