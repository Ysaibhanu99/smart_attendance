<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Department Analytics — SmartAttend</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/components.js"></script>
<script src="../js/main.js"></script>
<script src="../js/charts.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  loadComponents('hod', 'Department Analytics', 'analytics.html');
  await API.init(['stats', 'departments', 'notifications']);
  renderPage();
});

function renderPage() {
  const s = APP_DATA.hodStats;
  
  // Extract subject data for charts and table
  const subjectNames = APP_DATA.majorSubjects.map(sub => sub.name);
  const subjectAvgs = APP_DATA.majorSubjects.map(sub => sub.pct);
  
  const subjectRows = APP_DATA.majorSubjects.map(sub => `
    <tr>
      <td><strong>${sub.name}</strong></td>
      <td><span class="badge ${sub.type === 'Lab' ? 'badge-purple' : 'badge-info'}">${sub.type}</span></td>
      <td>${sub.total} Classes</td>
      <td>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill ${sub.pct < sub.threshold ? 'danger' : 'primary'}" style="width:${sub.pct}%"></div></div>
          <span class="progress-pct" style="${sub.pct < sub.threshold ? 'color:var(--accent-red)' : ''}">${sub.pct}%</span>
        </div>
      </td>
      <td style="color:var(--text-secondary)">Target: ${sub.threshold}%</td>
    </tr>
  `).join('');

  document.getElementById('pageContent').innerHTML = `
    <div class="page-header">
      <h1 class="page-title">Department Analytics</h1>
      <p class="page-subtitle">Performance metrics and subject-wise attendance breakdown for your department.</p>
    </div>

    <!-- Top Stats -->
    <div class="stats-grid" style="margin-bottom:24px">
      <div class="stat-card green"><div class="stat-icon green"><i class="fa-solid fa-users"></i></div><div class="stat-value">${s.students}</div><div class="stat-label">Total Students</div></div>
      <div class="stat-card blue"><div class="stat-icon blue"><i class="fa-solid fa-percent"></i></div><div class="stat-value">${s.avg_att}%</div><div class="stat-label">Dept Average</div></div>
      <div class="stat-card amber"><div class="stat-icon amber"><i class="fa-solid fa-triangle-exclamation"></i></div><div class="stat-value">${s.at_risk}</div><div class="stat-label">At-Risk Students</div></div>
      <div class="stat-card purple"><div class="stat-icon purple"><i class="fa-solid fa-file-circle-question"></i></div><div class="stat-value">${s.pending_leaves}</div><div class="stat-label">Pending Leaves</div></div>
    </div>

    <!-- Charts -->
    <div class="grid-2" style="margin-bottom:24px">
      <div class="card">
        <div class="card-header"><span class="card-title"><i class="fa-solid fa-chart-line" style="color:var(--accent-purple);margin-right:6px"></i>Weekly Trend</span></div>
        <div class="card-body"><div class="chart-wrap"><canvas id="hodTrendChart"></canvas></div></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title"><i class="fa-solid fa-book" style="color:var(--accent-cyan);margin-right:6px"></i>Subject Performance</span></div>
        <div class="card-body"><div class="chart-wrap"><canvas id="hodSubjectChart"></canvas></div></div>
      </div>
    </div>

    <!-- Data Table -->
    <div class="card">
      <div class="card-header" style="display:flex; justify-content:space-between; align-items:center;">
        <span class="card-title"><i class="fa-solid fa-table" style="color:var(--accent-blue);margin-right:6px"></i>Subject Breakdown</span>
        <button class="btn btn-ghost btn-sm" onclick="flashMessage('Exporting Department Report...', 'success')"><i class="fa-solid fa-download"></i> Download Report</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Subject Name</th><th>Type</th><th>Total Classes</th><th>Avg Attendance</th><th>Requirement</th></tr></thead>
          <tbody>${subjectRows}</tbody>
        </table>
      </div>
    </div>
  `;

  // Initialize Charts
  if (typeof applyChartDefaults === 'function') applyChartDefaults();
  
  if (typeof renderFacultyTrendChart === 'function') {
    // Mock trend data for HOD
    renderFacultyTrendChart('hodTrendChart', ['Week 1','Week 2','Week 3','Week 4','Week 5'], [88, 86, 85, 83, 85]);
  }
  if (typeof renderSubjectBarChart === 'function') {
    renderSubjectBarChart('hodSubjectChart', subjectNames, subjectAvgs);
  }
}
</script>
</body>
</html>
