<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faculty Dashboard — SmartAttend</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
<div id="app"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="../js/data.js"></script>
<script src="../js/components.js"></script>
<script src="../js/main.js"></script>
<script src="../js/charts.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  loadComponents('faculty', 'Faculty Dashboard', 'dashboard.html');
  renderPage();
});

function renderPage() {
  const s  = APP_DATA.facultyStats;
  const user = Session.get() || APP_DATA.session.faculty;

  const scheduleRows = APP_DATA.todaysClasses.map(c => `
    <div style="display:flex;align-items:center;gap:16px;padding:14px 20px;border-bottom:1px solid var(--border)">
      <div style="min-width:80px">
        <div style="font-size:11px;color:var(--text-muted)">Period ${c.period}</div>
        <div style="font-size:12px;color:var(--text-secondary)">${c.time}</div>
      </div>
      <div style="flex:1">
        <div style="font-weight:600;color:var(--text-primary)">
          ${c.subject}
          ${c.is_lab ? '<span class="badge badge-purple" style="margin-left:6px;font-size:10px">LAB</span>' : ''}
        </div>
        <div style="font-size:12px;color:var(--text-muted)">${c.room} · ${c.students} students</div>
      </div>
      <div>
        ${c.marked
          ? '<span class="badge badge-success"><i class="fa-solid fa-check"></i> Marked</span>'
          : `<a href="mark-attendance.html" class="btn btn-primary btn-sm"><i class="fa-solid fa-clipboard-check"></i> Mark Now</a>`}
      </div>
    </div>`).join('');

  const defaulterRows = APP_DATA.defaulters.map(d => `
    <tr>
      <td><strong>${d.name}</strong></td>
      <td style="color:var(--text-muted);font-size:12px">${d.roll}</td>
      <td style="color:var(--text-secondary)">${d.subject}</td>
      <td>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill danger" style="width:${d.pct}%" data-width="${d.pct}%"></div></div>
          <span class="progress-pct" style="color:var(--accent-red)">${d.pct}%</span>
        </div>
      </td>
      <td style="color:var(--text-secondary)">${d.left} classes</td>
      <td><span class="badge badge-warning">Attend ${d.needed} more</span></td>
    </tr>`).join('');

  document.getElementById('pageContent').innerHTML = `
    <div class="page-header">
      <h1 class="page-title">Welcome, ${user.name}</h1>
      <p class="page-subtitle">CSE Department · ${new Date().toLocaleDateString('en-IN',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
    </div>

    <div class="stats-grid">
      <div class="stat-card blue"><div class="stat-icon blue"><i class="fa-solid fa-book"></i></div><div class="stat-value">${s.subjects}</div><div class="stat-label">My Subjects</div></div>
      <div class="stat-card green"><div class="stat-icon green"><i class="fa-solid fa-user-graduate"></i></div><div class="stat-value">${s.students}</div><div class="stat-label">Total Students</div></div>
      <div class="stat-card amber"><div class="stat-icon amber"><i class="fa-solid fa-triangle-exclamation"></i></div><div class="stat-value">${s.defaulters}</div><div class="stat-label">Defaulters</div></div>
      <div class="stat-card purple"><div class="stat-icon purple"><i class="fa-solid fa-chalkboard"></i></div><div class="stat-value">${s.classes_today}</div><div class="stat-label">Classes Today</div></div>
    </div>

    <div class="card" style="margin-bottom:20px">
      <div class="card-header">
        <span class="card-title"><i class="fa-solid fa-calendar-day" style="color:var(--accent-blue);margin-right:6px"></i>Today's Schedule</span>
      </div>
      <div style="padding:0">${scheduleRows}</div>
    </div>

    <div class="grid-2" style="margin-bottom:20px">
      <div class="card">
        <div class="card-header"><span class="card-title"><i class="fa-solid fa-chart-line" style="color:var(--accent-purple);margin-right:6px"></i>Class Attendance Trend</span></div>
        <div class="card-body"><div class="chart-wrap"><canvas id="trendChart"></canvas></div></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title"><i class="fa-solid fa-book" style="color:var(--accent-cyan);margin-right:6px"></i>Subject-wise Average</span></div>
        <div class="card-body"><div class="chart-wrap"><canvas id="subjectChart"></canvas></div></div>
      </div>
    </div>

    <div style="background:linear-gradient(135deg,rgba(59,130,246,0.08),rgba(6,182,212,0.05));border:1px solid rgba(59,130,246,0.2);border-radius:var(--radius-lg);padding:18px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
      <div style="display:flex;align-items:center;gap:14px">
        <div style="width:42px;height:42px;background:rgba(59,130,246,0.12);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--accent-blue);font-size:18px"><i class="fa-solid fa-graduation-cap"></i></div>
        <div>
          <div style="font-weight:600;color:var(--text-primary)">Pending Marks Entry</div>
          <div style="font-size:13px;color:var(--text-secondary);margin-top:2px">Mid-Term marks for Data Structures and DWDM are not yet entered.</div>
        </div>
      </div>
      <a href="marks.html" class="btn btn-primary"><i class="fa-solid fa-graduation-cap"></i> Enter Marks</a>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title"><i class="fa-solid fa-triangle-exclamation" style="color:var(--accent-red);margin-right:6px"></i>Defaulters in My Subjects</span>
        <a href="defaulters.html" class="btn btn-ghost btn-sm">Full List</a>
      </div>
      <div class="table-wrap">
        <table><thead><tr><th>Student</th><th>Roll No</th><th>Subject</th><th>Attendance</th><th>Classes Left</th><th>Needed</th></tr></thead>
        <tbody>${defaulterRows}</tbody></table>
      </div>
    </div>
  `;

  applyChartDefaults();
  renderFacultyTrendChart('trendChart', ['Wk1','Wk2','Wk3','Wk4','Wk5','Wk6','Wk7','Wk8'], [88,85,87,82,79,81,80,84]);
  renderSubjectBarChart('subjectChart', ['Data Str','DWDM','Python Lab','Maths'], [76,82,88,91]);
  animateProgressBars();
}
</script>
</body>
</html>
