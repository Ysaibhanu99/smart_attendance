<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enter Marks — SmartAttend</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
  <style>
    /* ── Class Selection Step ─────────────────────────────── */
    .step-indicator {
      display: flex; align-items: center; gap: 0; margin-bottom: 28px;
    }
    .step {
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 600; color: var(--text-muted);
    }
    .step-num {
      width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; background: var(--surface);
      transition: all 0.25s;
    }
    .step.active .step-num  { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
    .step.active            { color: var(--text-primary); }
    .step.done .step-num    { background: #22c55e; border-color: #22c55e; color: #fff; }
    .step.done              { color: var(--text-secondary); }
    .step-divider { flex: 1; height: 2px; background: var(--border); margin: 0 10px; min-width: 24px; }
    .step.done + .step-divider { background: #22c55e; }

    /* ── Class Cards ──────────────────────────────────────── */
    .class-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 16px; margin-bottom: 8px; }
    .class-card {
      background: var(--surface); border: 2px solid var(--border); border-radius: 14px;
      padding: 20px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden;
    }
    .class-card:hover  { border-color: var(--accent-blue); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(59,130,246,0.12); }
    .class-card.selected { border-color: var(--accent-blue); background: rgba(59,130,246,0.05); }
    .class-card.selected::after {
      content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
      position: absolute; top: 12px; right: 14px; color: var(--accent-blue); font-size: 14px;
    }
    .class-card-year  { font-family: var(--font-head); font-size: 16px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
    .class-card-meta  { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
    .class-card-stats { display: flex; gap: 12px; }
    .class-stat       { font-size: 11px; color: var(--text-secondary); display: flex; align-items: center; gap: 4px; }

    /* ── Subject Tabs ─────────────────────────────────────── */
    .subject-tab-bar  { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .subject-tab {
      padding: 9px 18px; border-radius: 8px; font-size: 13px; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border); background: var(--surface);
      color: var(--text-secondary); transition: all 0.2s;
    }
    .subject-tab:hover  { border-color: var(--accent-blue); color: var(--accent-blue); }
    .subject-tab.active { background: var(--accent-blue); color: #fff; border-color: var(--accent-blue); }

    /* ── Exam Tabs ────────────────────────────────────────── */
    .exam-tab-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .exam-tab {
      padding: 7px 15px; border-radius: 8px; font-size: 13px; font-weight: 500;
      cursor: pointer; border: 1px solid var(--border); background: var(--surface);
      color: var(--text-secondary); transition: all 0.2s;
    }
    .exam-tab.active    { background: var(--accent-purple); color: #fff; border-color: var(--accent-purple); }
    .exam-tab.published { border-color: rgba(34,197,94,0.5); color: #22c55e; }

    /* ── Marks Input ──────────────────────────────────────── */
    .marks-input {
      width: 72px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 10px; color: var(--text-primary);
      font-family: var(--font-body); font-size: 14px; text-align: center; transition: border-color 0.15s;
    }
    .marks-input:focus  { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
    .grade-preview      { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 6px; margin-left: 8px; }
    .status-badge-pub   { background: rgba(34,197,94,0.12);  color: #22c55e; border: 1px solid rgba(34,197,94,0.25); }
    .status-badge-pend  { background: rgba(245,158,11,0.12); color: var(--accent-amber); border: 1px solid rgba(245,158,11,0.25); }

    /* ── Breadcrumb ───────────────────────────────────────── */
    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-muted); margin-bottom: 20px; flex-wrap: wrap; }
    .breadcrumb a { color: var(--accent-blue); cursor: pointer; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }
    .breadcrumb-sep { color: var(--border); }
  </style>
</head>
<body>
<div id="app"></div>
<script src="../js/data.js"></script>
<script src="../js/components.js"></script>
<script src="../js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  loadComponents('faculty', 'Enter Marks', 'marks.html');
  renderPage();
});

/* ── State ─────────────────────────────────────────────────── */
const FACULTY_NAME = 'Prof. John Doe'; // Matches session faculty
let selectedClassId  = null;
let currentSubjIdx   = 0;
let currentExamIdx   = 0;

// Deep-clone classList for interactive editing
let localClassList = APP_DATA.classList.map(cls => ({
  ...cls,
  subjects: cls.subjects.map(sub => ({
    ...sub,
    exams: sub.exams.map(e => ({ ...e })),
    students: sub.students.map(st => ({ ...st, marks: [...st.marks] }))
  }))
}));

// Filter to classes/subjects this faculty teaches
function myClasses() {
  return localClassList.filter(cls =>
    cls.subjects.some(s => s.faculty === FACULTY_NAME)
  );
}

/* ── Grade Helper ───────────────────────────────────────────── */
function getGrade(marks, max) {
  if (marks === null || marks === undefined || marks === '') return null;
  const m = parseFloat(marks);
  if (isNaN(m)) return null;
  const pct = (m / max) * 100;
  for (const g of APP_DATA.gradeConfig) { if (pct >= g.min) return g; }
  return APP_DATA.gradeConfig[APP_DATA.gradeConfig.length - 1];
}

/* ── Render: Main Page ──────────────────────────────────────── */
function renderPage() {
  document.getElementById('pageContent').innerHTML = `
    <div class="page-header">
      <h1 class="page-title"><i class="fa-solid fa-graduation-cap" style="margin-right:8px;color:var(--accent-blue)"></i>Marks Entry</h1>
      <p class="page-subtitle">Enter and publish exam marks for your classes</p>
    </div>
    <div id="stepIndicator"></div>
    <div id="mainArea"></div>
  `;
  showClassSelection();
}

/* ── Step 1: Class Selection ────────────────────────────────── */
function showClassSelection() {
  selectedClassId = null;
  renderStepIndicator(1);
  const classes = myClasses();

  document.getElementById('mainArea').innerHTML = `
    <div style="margin-bottom:16px">
      <div style="font-family:var(--font-head);font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:4px">
        <i class="fa-solid fa-chalkboard" style="color:var(--accent-blue);margin-right:8px"></i>Step 1 — Select Your Class
      </div>
      <div style="font-size:13px;color:var(--text-muted)">Choose the class you want to enter marks for.</div>
    </div>
    <div class="class-grid">
      ${classes.map(cls => {
        const mySubjects = cls.subjects.filter(s => s.faculty === FACULTY_NAME);
        const pubCount   = mySubjects.reduce((a,s) => a + s.exams.filter(e=>e.published).length, 0);
        const pendCount  = mySubjects.reduce((a,s) => a + s.exams.filter(e=>!e.published).length, 0);
        return `
          <div class="class-card" id="cls_${cls.id}" onclick="selectClass('${cls.id}')">
            <div class="class-card-year">${cls.label}</div>
            <div class="class-card-meta">
              <i class="fa-solid fa-chalkboard-user" style="margin-right:4px"></i>Class Teacher: ${cls.classTeacher}
            </div>
            <div class="class-card-stats">
              <div class="class-stat"><i class="fa-solid fa-users"></i> ${cls.strength} students</div>
              <div class="class-stat"><i class="fa-solid fa-book"></i> ${mySubjects.length} subject${mySubjects.length!==1?'s':''}</div>
              <div class="class-stat" style="color:#22c55e"><i class="fa-solid fa-check"></i> ${pubCount} pub.</div>
              <div class="class-stat" style="color:var(--accent-amber)"><i class="fa-regular fa-clock"></i> ${pendCount} pending</div>
            </div>
          </div>`;
      }).join('')}
    </div>
    <div style="margin-top:20px">
      <button class="btn btn-primary" id="proceedBtn" disabled onclick="proceedToSubject()">
        <i class="fa-solid fa-arrow-right"></i> Proceed to Subject Selection
      </button>
    </div>
  `;
}

function selectClass(id) {
  selectedClassId = id;
  document.querySelectorAll('.class-card').forEach(c => c.classList.remove('selected'));
  const el = document.getElementById(`cls_${id}`);
  if (el) el.classList.add('selected');
  const btn = document.getElementById('proceedBtn');
  if (btn) { btn.disabled = false; }
}

/* ── Step 2+3: Subject & Exam Selection ─────────────────────── */
function proceedToSubject() {
  if (!selectedClassId) return;
  currentSubjIdx = 0;
  currentExamIdx = 0;
  renderStepIndicator(2);
  renderSubjectArea();
}

function renderSubjectArea() {
  const cls = localClassList.find(c => c.id === selectedClassId);
  const mySubjects = cls.subjects.filter(s => s.faculty === FACULTY_NAME);

  document.getElementById('mainArea').innerHTML = `
    <div class="breadcrumb">
      <a onclick="showClassSelection()"><i class="fa-solid fa-chalkboard" style="margin-right:4px"></i>Classes</a>
      <span class="breadcrumb-sep">›</span>
      <strong style="color:var(--text-primary)">${cls.label}</strong>
    </div>

    <div style="margin-bottom:14px">
      <div style="font-family:var(--font-head);font-size:15px;font-weight:700;color:var(--text-primary);margin-bottom:4px">
        <i class="fa-solid fa-book" style="color:var(--accent-blue);margin-right:8px"></i>Step 2 — Select Subject
      </div>
    </div>
    <div class="subject-tab-bar" id="subjectTabBar"></div>
    <div style="margin-bottom:14px">
      <div style="font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--text-primary);margin-bottom:4px">
        <i class="fa-solid fa-file-pen" style="color:var(--accent-purple);margin-right:8px"></i>Step 3 — Select Exam
      </div>
    </div>
    <div class="exam-tab-bar" id="examTabBar"></div>
    <div id="marksTable"></div>
  `;

  renderSubjectTabs(mySubjects);
  renderExamTabs(mySubjects);
  renderMarksTable(mySubjects);
}

function renderSubjectTabs(subjects) {
  document.getElementById('subjectTabBar').innerHTML = subjects.map((s, i) => `
    <button class="subject-tab ${i===currentSubjIdx?'active':''}" onclick="selectSubject(${i})">
      <i class="fa-solid fa-book" style="margin-right:5px;font-size:11px"></i>${s.subject}
      <span style="font-size:10px;margin-left:5px;opacity:0.7">/ ${s.maxMarks}</span>
    </button>`).join('');
}

function renderExamTabs(subjects) {
  const sub = subjects[currentSubjIdx];
  document.getElementById('examTabBar').innerHTML = sub.exams.map((e, i) => `
    <button class="exam-tab ${i===currentExamIdx?'active':''} ${e.published?'published':''}"
            onclick="selectExam(${i})">
      ${e.exam}
      ${e.published ? '<i class="fa-solid fa-check" style="margin-left:5px;font-size:10px"></i>' : ''}
    </button>`).join('');
}

function selectSubject(idx) {
  currentSubjIdx = idx;
  currentExamIdx = 0;
  const cls = localClassList.find(c => c.id === selectedClassId);
  const mySubjects = cls.subjects.filter(s => s.faculty === FACULTY_NAME);
  renderSubjectTabs(mySubjects);
  renderExamTabs(mySubjects);
  renderMarksTable(mySubjects);
}

function selectExam(idx) {
  currentExamIdx = idx;
  const cls = localClassList.find(c => c.id === selectedClassId);
  const mySubjects = cls.subjects.filter(s => s.faculty === FACULTY_NAME);
  renderExamTabs(mySubjects);
  renderMarksTable(mySubjects);
}

function renderMarksTable(subjects) {
  const sub  = subjects[currentSubjIdx];
  const exam = sub.exams[currentExamIdx];
  const eIdx = currentExamIdx;

  const rows = sub.students.map((st, si) => {
    const m = st.marks[eIdx];
    const g = getGrade(m, sub.maxMarks);
    const gradePill = g ? `<span class="grade-preview" style="background:${g.color}18;color:${g.color}">${g.grade}</span>` : '';
    return `
      <tr>
        <td style="font-size:12px;color:var(--text-muted)">${st.roll}</td>
        <td><strong>${st.name}</strong></td>
        <td>
          <div style="display:flex;align-items:center;gap:6px">
            <input class="marks-input" type="number" min="0" max="${sub.maxMarks}"
              value="${m !== null && m !== undefined ? m : ''}"
              placeholder="—"
              id="marks_${si}"
              ${exam.published ? 'disabled' : ''}
              oninput="onMarksInput(${si}, this.value)"
            />
            <span id="grade_${si}">${gradePill}</span>
          </div>
        </td>
        <td style="font-size:12px;color:var(--text-muted)">/ ${sub.maxMarks}</td>
      </tr>`;
  }).join('');

  document.getElementById('marksTable').innerHTML = `
    <div class="card">
      <div class="card-header">
        <span class="card-title">
          <i class="fa-solid fa-table" style="color:var(--accent-blue);margin-right:6px"></i>
          ${sub.subject} — ${exam.exam}
        </span>
        <span class="badge ${exam.published ? 'status-badge-pub' : 'status-badge-pend'}">
          <i class="fa-solid ${exam.published ? 'fa-check' : 'fa-clock'}"></i>
          ${exam.published ? 'Published' : 'Draft'}
        </span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Roll No</th><th>Student Name</th><th>Marks</th><th>Max</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="card-body" style="border-top:1px solid var(--border);display:flex;gap:10px;flex-wrap:wrap">
        ${exam.published
          ? `<span style="font-size:13px;color:var(--accent-green)"><i class="fa-solid fa-circle-check"></i> Marks published — contact HOD to make corrections.</span>`
          : `<button class="btn btn-ghost" onclick="saveDraft()"><i class="fa-solid fa-floppy-disk"></i> Save Draft</button>
             <button class="btn btn-primary" onclick="publishMarks()"><i class="fa-solid fa-paper-plane"></i> Publish Marks</button>`
        }
      </div>
    </div>
  `;
}

/* ── Step Indicator ─────────────────────────────────────────── */
function renderStepIndicator(active) {
  const steps = [
    { n: 1, label: 'Select Class' },
    { n: 2, label: 'Select Subject' },
    { n: 3, label: 'Enter Marks' },
  ];
  document.getElementById('stepIndicator').innerHTML = `
    <div class="step-indicator">
      ${steps.map((s, i) => `
        <div class="step ${active > s.n ? 'done' : active === s.n ? 'active' : ''}">
          <div class="step-num">${active > s.n ? '<i class="fa-solid fa-check" style="font-size:10px"></i>' : s.n}</div>
          <span>${s.label}</span>
        </div>
        ${i < steps.length - 1 ? `<div class="step-divider"></div>` : ''}
      `).join('')}
    </div>`;
}

/* ── Actions ────────────────────────────────────────────────── */
function onMarksInput(si, val) {
  const cls = localClassList.find(c => c.id === selectedClassId);
  const mySubjects = cls.subjects.filter(s => s.faculty === FACULTY_NAME);
  const sub = mySubjects[currentSubjIdx];
  const num = val === '' ? null : parseFloat(val);
  sub.students[si].marks[currentExamIdx] = isNaN(num) ? null : num;
  const g = getGrade(num, sub.maxMarks);
  const gradePill = g ? `<span class="grade-preview" style="background:${g.color}18;color:${g.color}">${g.grade}</span>` : '';
  const gradeEl = document.getElementById(`grade_${si}`);
  if (gradeEl) gradeEl.innerHTML = gradePill;
}

function saveDraft() {
  showToast('Draft saved successfully!', 'success');
}

function publishMarks() {
  const cls = localClassList.find(c => c.id === selectedClassId);
  const mySubjects = cls.subjects.filter(s => s.faculty === FACULTY_NAME);
  const sub  = mySubjects[currentSubjIdx];
  const exam = sub.exams[currentExamIdx];
  const allFilled = sub.students.every(st => st.marks[currentExamIdx] !== null && st.marks[currentExamIdx] !== undefined);
  if (!allFilled) {
    showToast('Please enter marks for all students before publishing.', 'danger');
    return;
  }
  confirmAction(`Publish ${exam.exam} marks for ${sub.subject}? This cannot be undone.`, () => {
    exam.published = true;
    showToast(`${exam.exam} marks for ${sub.subject} published!`, 'success');
    renderExamTabs(mySubjects);
    renderMarksTable(mySubjects);
  });
}
</script>
</body>
</html>
