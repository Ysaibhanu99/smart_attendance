<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Not Found</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/main.css" />
</head>
<body>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;position:relative;overflow:hidden">
  <div style="font-family:var(--font-head);font-size:140px;font-weight:800;color:var(--accent-blue);opacity:0.06;position:absolute;user-select:none">404</div>
  <div style="position:relative;z-index:1">
    <i class="fa-solid fa-map-location-dot" style="font-size:48px;color:var(--accent-blue);opacity:0.4;margin-bottom:16px;display:block"></i>
    <h1 style="font-family:var(--font-head);font-size:24px;font-weight:700;color:var(--text-primary);margin-bottom:8px">Page Not Found</h1>
    <p style="font-size:14px;color:var(--text-secondary);margin-bottom:24px;max-width:320px">The page you're looking for doesn't exist or was moved.</p>
    <button onclick="history.back()" class="btn btn-ghost" style="margin-right:8px"><i class="fa-solid fa-arrow-left"></i> Go Back</button>
    <a href="login.html" class="btn btn-primary"><i class="fa-solid fa-house"></i> Home</a>
  </div>
</div>
</body>
</html>
