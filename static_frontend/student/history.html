<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Full Attendance History — SmartAttend</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body>
<div id="app"></div>

<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/components.js"></script>
<script src="../js/main.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  loadComponents('student', 'Full History', 'history.html');
  await API.init(['notifications']);
  renderPage();
});

function renderPage() {
  const getBadgeClass = (status) => {
    if (status === 'Present') return 'badge-success';
    if (status === 'Absent') return 'badge-danger';
    return 'badge-warning';
  };

  const rows = APP_DATA.dailyHistory.map(row => `
    <tr>
      <td>${row.date}</td>
      <td>Period ${row.period}</td>
      <td><strong>${row.subject}</strong></td>
      <td><span class="badge ${getBadgeClass(row.status)}">${row.status}</span></td>
      <td style="color:var(--text-secondary)">${row.remarks}</td>
    </tr>`).join('');

  document.getElementById('pageContent').innerHTML = `
    <div class="page-header">
      <h1 class="page-title">Detailed History</h1>
      <p class="page-subtitle">Your day-by-day, period-by-period attendance log.</p>
    </div>

    <div class="card">
      <div class="card-header">
        <span class="card-title"><i class="fa-solid fa-clock-rotate-left" style="color:var(--accent-purple);margin-right:6px"></i>Attendance Log</span>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Date</th><th>Period</th><th>Subject</th><th>Status</th><th>Remarks</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
  `;
}
</script>
</body>
</html>
